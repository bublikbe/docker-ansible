<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Users</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
    input { display: block; margin: 6px 0; padding: 6px; width: 100%; }
    button { padding: 8px 16px; margin-top: 6px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
  </style>
</head>
<body>
  <h1>Users</h1>

  <h2>Add user</h2>
  <input id="username" placeholder="Username">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="addUser()">Add</button>

  <h2>All users</h2>
  <table id="table">
    <tr><th>ID</th><th>Username</th><th>Email</th></tr>
  </table>

  <script>
    function loadUsers() {
      fetch('/users')
        .then(r => r.json())
        .then(users => {
          const table = document.getElementById('table');
          table.innerHTML = '<tr><th>ID</th><th>Username</th><th>Email</th></tr>';
          users.forEach(u => {
            const row = table.insertRow();
            row.insertCell().textContent = u.id;
            row.insertCell().textContent = u.username;
            row.insertCell().textContent = u.email;
          });
        });
    }

    function addUser() {
      const user = {
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };
      fetch('/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(user)
      }).then(() => loadUsers());
    }

    loadUsers();
  </script>
</body>
</html>
