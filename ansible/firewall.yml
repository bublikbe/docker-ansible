---
- name: Lock down the Application Server (Slave 1)
  hosts: appserver
  tasks:
    - name: Install UFW
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true

    - name: Allow Docker's forwarded traffic
      ansible.builtin.lineinfile:
        path: /etc/default/ufw
        regexp: '^DEFAULT_FORWARD_POLICY='
        line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'

    - name: Default deny incoming
      ansible.builtin.command: ufw default deny incoming

    - name: Default allow outgoing
      ansible.builtin.command: ufw default allow outgoing

    - name: Allow SSH
      ansible.builtin.command: ufw allow 22/tcp

    - name: Allow the API ports
      ansible.builtin.command: ufw allow 5001/tcp

    - name: Enable UFW
      ansible.builtin.command: ufw --force enable

- name: Lock down the Database Server (Slave 2)
  hosts: dbserver
  vars:
    app_server_ip: "{{ hostvars['slave1'].ansible_default_ipv4.address }}"
  tasks:
    - name: Install UFW
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true

    - name: Allow Docker's forwarded traffic
      ansible.builtin.lineinfile:
        path: /etc/default/ufw
        regexp: '^DEFAULT_FORWARD_POLICY='
        line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'

    - name: Default deny incoming
      ansible.builtin.command: ufw default deny incoming

    - name: Default allow outgoing
      ansible.builtin.command: ufw default allow outgoing

    - name: Allow SSH
      ansible.builtin.command: ufw allow 22/tcp

    - name: Allow PostgreSQL only from the Application Server
      ansible.builtin.command: "ufw allow from {{ app_server_ip }} to any port 5432 proto tcp"

    - name: Enable UFW
      ansible.builtin.command: ufw --force enable

- name: Lock down the Master
  hosts: master
  tasks:
    - name: Install UFW
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true

    - name: Default deny incoming
      ansible.builtin.command: ufw default deny incoming

    - name: Default allow outgoing
      ansible.builtin.command: ufw default allow outgoing

    - name: Allow SSH
      ansible.builtin.command: ufw allow 22/tcp

    - name: Enable UFW
      ansible.builtin.command: ufw --force enable
