[master]
localhost ansible_connection=local

[appserver]
slave1

[dbserver]
slave2

[slaves:children]
appserver
dbserver

[slaves:vars]
ansible_user=root
ansible_connection=ssh
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=/root/.ssh/id_rsa
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
